AWSTemplateFormatVersion: "2010-09-09"
Description: Secrets Manager secret for PostgreSQL connection credentials.

Resources:
  DBSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    Properties:
      Name: mlbstats-db-connection
      Description: PostgreSQL connection string for the MLBStats data platform
      Tags:
        - Key: Project
          Value: MLBStats

Outputs:
  DBSecretName:
    Description: Secrets Manager secret name for the PostgreSQL connection string
    Value: !Ref DBSecret
    Export:
      Name: !Sub "${AWS::StackName}-DBSecretName"

  DBSecretArn:
    Description: Secrets Manager secret ARN for the PostgreSQL connection string
    Value: !Ref DBSecret
    Export:
      Name: !Sub "${AWS::StackName}-DBSecretArn"
