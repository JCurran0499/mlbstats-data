AWSTemplateFormatVersion: "2010-09-09"
Description: ECR repositories for MLBStats Lambda container images.

Resources:
  RosterSyncRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: mlbstats/roster-sync
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: MLBStats

  StatsSyncRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: mlbstats/stats-sync
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: MLBStats

Outputs:
  RosterSyncRepositoryUri:
    Description: ECR repository URI for roster_sync images
    Value: !GetAtt RosterSyncRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-RosterSyncRepositoryUri"

  StatsSyncRepositoryUri:
    Description: ECR repository URI for stats_sync images
    Value: !GetAtt StatsSyncRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-StatsSyncRepositoryUri"
