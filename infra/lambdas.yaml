AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda functions, IAM roles, CloudWatch alarms, and EventBridge schedules for MLBStats ingestion.

Parameters:
  RosterSyncImageTag:
    Type: String
    Description: Image tag (or digest) to deploy for the roster_sync Lambda

Resources:

  # ---- Logs -----------------------------------------------------------------

  RosterSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/mlbstats-roster-sync
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- IAM ------------------------------------------------------------------

  RosterSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-roster-sync-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadDBSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !ImportValue mlbstats-secrets-DBSecretArn
      Tags:
        - Key: Project
          Value: MLBStats

  RosterSyncSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-roster-sync-scheduler-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt RosterSyncFunction.Arn
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- Lambda ---------------------------------------------------------------

  RosterSyncFunction:
    Type: AWS::Lambda::Function
    DependsOn: RosterSyncLogGroup
    Properties:
      FunctionName: mlbstats-roster-sync
      PackageType: Image
      Code:
        ImageUri: !Sub
          - "${RepoUri}:${RosterSyncImageTag}"
          - RepoUri: !ImportValue mlbstats-ecr-RosterSyncRepositoryUri
      Role: !GetAtt RosterSyncRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          DB_CONNECTION_SECRET: !ImportValue mlbstats-secrets-DBSecretName
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- EventBridge Scheduler -----------------------------------------------

  RosterSyncMorningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: mlbstats-roster-sync-morning
      Description: Trigger roster_sync at 9am ET daily
      ScheduleExpression: "cron(0 9 * * ? *)"
      ScheduleExpressionTimezone: America/New_York
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt RosterSyncFunction.Arn
        RoleArn: !GetAtt RosterSyncSchedulerRole.Arn
      State: ENABLED

  RosterSyncEveningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: mlbstats-roster-sync-evening
      Description: Trigger roster_sync at 9pm ET daily
      ScheduleExpression: "cron(0 21 * * ? *)"
      ScheduleExpressionTimezone: America/New_York
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt RosterSyncFunction.Arn
        RoleArn: !GetAtt RosterSyncSchedulerRole.Arn
      State: ENABLED
