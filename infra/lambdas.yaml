AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda functions, IAM roles, CloudWatch alarms, and EventBridge schedules for MLBStats ingestion.

# Image tags are read from SSM at deploy time:
#   /mlbstats/lambdas/<name>/image-tag
# The Makefile `push` target writes the tag after a successful docker push.

Resources:

  # ---- Logs -----------------------------------------------------------------

  RosterSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/mlbstats-roster-sync
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: MLBStats

  StatsSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/mlbstats-stats-sync
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- IAM ------------------------------------------------------------------

  RosterSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-roster-sync-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadDBParameter
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mlbstats/db/connection-string"
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: Project
          Value: MLBStats

  StatsSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-stats-sync-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadDBParameter
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mlbstats/db/connection-string"
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: Project
          Value: MLBStats

  RosterSyncSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-roster-sync-scheduler-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt RosterSyncFunction.Arn
      Tags:
        - Key: Project
          Value: MLBStats

  StatsSyncSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mlbstats-stats-sync-scheduler-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt StatsSyncFunction.Arn
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- Lambda ---------------------------------------------------------------

  RosterSyncFunction:
    Type: AWS::Lambda::Function
    DependsOn: RosterSyncLogGroup
    Properties:
      FunctionName: mlbstats-roster-sync
      PackageType: Image
      Code:
        ImageUri: !Sub
          - "${RepoUri}:{{resolve:ssm:/mlbstats/lambdas/roster-sync/image-tag}}"
          - RepoUri: !ImportValue mlbstats-ecr-RosterSyncRepositoryUri
      Role: !GetAtt RosterSyncRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          DB_CONNECTION_PARAMETER: /mlbstats/db/connection-string
      Tags:
        - Key: Project
          Value: MLBStats

  StatsSyncFunction:
    Type: AWS::Lambda::Function
    DependsOn: StatsSyncLogGroup
    Properties:
      FunctionName: mlbstats-stats-sync
      PackageType: Image
      Code:
        ImageUri: !Sub
          - "${RepoUri}:{{resolve:ssm:/mlbstats/lambdas/stats-sync/image-tag}}"
          - RepoUri: !ImportValue mlbstats-ecr-StatsSyncRepositoryUri
      Role: !GetAtt StatsSyncRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          DB_CONNECTION_PARAMETER: /mlbstats/db/connection-string
      Tags:
        - Key: Project
          Value: MLBStats

  # ---- EventBridge Scheduler -----------------------------------------------

  RosterSyncMorningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: mlbstats-roster-sync-morning
      Description: Trigger roster_sync at 9am ET daily
      ScheduleExpression: "cron(0 9 * * ? *)"
      ScheduleExpressionTimezone: America/New_York
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt RosterSyncFunction.Arn
        RoleArn: !GetAtt RosterSyncSchedulerRole.Arn
      State: ENABLED

  RosterSyncEveningSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: mlbstats-roster-sync-evening
      Description: Trigger roster_sync at 9pm ET daily
      ScheduleExpression: "cron(0 21 * * ? *)"
      ScheduleExpressionTimezone: America/New_York
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt RosterSyncFunction.Arn
        RoleArn: !GetAtt RosterSyncSchedulerRole.Arn
      State: ENABLED

  StatsSyncSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: mlbstats-stats-sync
      Description: Trigger stats_sync every 4 hours
      ScheduleExpression: "rate(4 hours)"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt StatsSyncFunction.Arn
        RoleArn: !GetAtt StatsSyncSchedulerRole.Arn
      State: ENABLED
